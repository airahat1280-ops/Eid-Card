<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Eid Mubarak - Rahat</title>
</head>

<body>

<!-- 🌌 Starry Background -->
<div class="starry-bg">
  <!-- Gradient -->
  <div class="sky"></div>
  <!-- Stars -->
  <div id="stars"></div>
  <!-- Moon -->
<div class="moon">
  <svg viewBox="0 0 100 100">
    <defs>
      <radialGradient id="moonGlow" cx="50%" cy="50%" r="60%">
        <!-- soft white glow -->
        <stop offset="0%" stop-color="rgba(255,255,255,0.5)" />
        <stop offset="100%" stop-color="transparent" />
      </radialGradient>
    </defs>
    <!-- glow -->
    <circle cx="50" cy="50" r="48" fill="url(#moonGlow)" />
    <!-- moon shape (soft white-blue) -->
    <path
      d="M 50 5 A 45 45 0 1 1 50 95 A 30 30 0 1 0 50 5"
      fill="#E6F0FF"
    />
  </svg>
</div>

  <!-- Clouds -->
  <div class="cloud" style="top:15%;"></div>
  <div class="cloud" style="top:35%;"></div>
  <div class="cloud" style="top:60%;"></div>
</div>

<!-- SLIDES -->
<div class="slideshow">
  <div class="slide active">
    <img src="assets/mosque-scene.png" alt="Mosque">
  </div>

  <div class="slide">
    <img src="assets/family-scene.png" alt="Family">
  </div>

  <div class="slide">
    <img src="assets/food-scene.png" alt="Food">
  </div>

  <div class="slide">
    <img src="assets/moon-scene.png" alt="Night">
  </div>
</div>
<div class="dots">
  <span onclick="goToSlide(0)"></span>
  <span onclick="goToSlide(1)"></span>
  <span onclick="goToSlide(2)"></span>
  <span onclick="goToSlide(3)"></span>
</div>

<!-- GIFT BOX -->
<!-- 🎁 Gift Box System -->
<div class="gift-container">
  <!-- Feedback -->
  <div id="feedback" class="feedback"></div>
  <!-- Counter -->
  <div id="counter" class="counter">Clicks: 0/3</div>
  <!-- Gift -->
  <button id="gift" class="gift">
    <div class="gift-inner">
      <!-- SVG Gift -->
      <svg width="100" height="110" viewBox="0 0 100 110">
        <rect x="10" y="45" width="80" height="55" rx="6" fill="#ff4d6d"/>
        <rect x="10" y="62" width="80" height="12" fill="#FFD54F"/>
        <rect x="42" y="45" width="16" height="55" fill="#FFD54F"/>
        <rect x="5" y="35" width="90" height="18" rx="4" fill="#e63950"/>
        <rect x="38" y="35" width="24" height="18" fill="#FFD54F"/>
        <ellipse cx="40" cy="30" rx="14" ry="10" fill="#FFD54F"/>
        <ellipse cx="60" cy="30" rx="14" ry="10" fill="#FFD54F"/>
        <circle cx="50" cy="32" r="6" fill="#ffe066"/>
      </svg>
      <span class="gift-text">Open Me ✨</span>
    </div>
  </button>
</div>

<!-- 🎉 FINAL MESSAGE SCREEN -->
<div id="final-screen" class="final-screen">
  <!-- Background -->
  <div class="final-bg"></div>
  <!-- Confetti -->
  <div id="confetti-container" class="confetti-container"></div>
  <!-- Content -->
  <div class="final-content">
    <h1 class="eid-text">Eid Mubarak</h1>
    <!-- Crescent -->
    <div class="crescent">
      <svg width="60" height="60" viewBox="0 0 100 100">
        <path
          d="M 50 5 A 45 45 0 1 1 50 95 A 30 30 0 1 0 50 5"
          fill="#FFD54F"
        />
      </svg>
    </div>
    <p class="eid-desc">
      May this blessed day bring you joy, peace, and prosperity
    </p>
    <p class="eid-from">— From Rahat</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
